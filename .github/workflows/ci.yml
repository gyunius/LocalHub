name: CI

on:
  push:
    branches: [ main, 'feat/*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11' ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Run backend tests (debug)
        env:
          SKIP_MIGRATE: '1'
        run: |
          set -eux
          # Ensure we're at the repository root so pytest finds tests and pytest.ini
          cd $GITHUB_WORKSPACE
          echo "PWD: $(pwd)"
          echo "Listing repo files:"; ls -la
          echo "Python version:"; python -V
          echo "Pip list:"; python -m pip list
          echo "Running pytest for repo tests (verbose)"
          python -m pytest tests -vv
